; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = links2004/WebSockets@^2.7.3

; Make the repo-wide shared/ headers visible (e.g. secrets.h).
; secrets.h is gitignored; copy shared/include/secrets.example.h to
; shared/include/secrets.h and fill in your WiFi credentials.
build_flags = -I"${PROJECT_DIR}/../shared/include"

; Use LittleFS for the on-chip filesystem (instead of the older SPIFFS).
; Files in this project's data/ folder are uploaded with
;   pio run --target uploadfs
; which is a separate step from `pio run --target upload` (code).
board_build.filesystem = littlefs
